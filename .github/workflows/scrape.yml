name: Daily Deals Scraper

on:
  schedule:
    # Run twice a day at 6:00 AM and 6:00 PM UTC
    - cron: '0 6,18 * * *'
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to commit the updated deals.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run newsletter parser tests
        run: npm run test:newsletter

      # Writes public/data/nike_promos.json & adidas_promos.json when Gmail matches (exits 0 if secrets unset).
      - name: Ingest Nike/Adidas newsletters (Gmail)
        run: npm run ingest-newsletters
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}

      - name: Install Puppeteer Browsers
        run: npx puppeteer browsers install chrome

      - name: Run Scraper
        run: npm run scrape
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          SCRAPER_PROXY_URL: ${{ secrets.SCRAPER_PROXY_URL }}
          MERGE_NEWSLETTER_DEALS: '1'

      # Pushes with GITHUB_TOKEN do NOT trigger other workflows (GitHub limitation).
      # Set repo secret GH_PUSH_TOKEN: classic PAT with `repo` scope (or fine-grained: Contents R/W on this repo).
      - name: Commit and Push Changes
        env:
          GH_PUSH_TOKEN: ${{ secrets.GH_PUSH_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/deals.json public/data/
          git commit -m "chore: update daily deals" || echo "No changes to commit"
          if [ -n "${GH_PUSH_TOKEN}" ]; then
            # actions/checkout injects GITHUB_TOKEN via http.extraheader which takes precedence over
            # URL-embedded credentials and prevents the push from triggering other workflows.
            # Unsetting the extraheader ensures the PAT is used, which DOES trigger downstream workflows.
            git config --unset-all http.https://github.com/.extraheader || true
            git remote set-url origin "https://x-access-token:${GH_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          else
            echo "::warning::GH_PUSH_TOKEN secret missing — push will not trigger Deploy to GitHub Pages. Add a PAT under Settings → Secrets → Actions."
          fi
          git push
